name: "transformation"
version: "0.1.0"
config-version: 2

# Profile lives in ./profiles.yml (run dbt with --profiles-dir .).
profile: "transformation"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  +persist_docs:
    relation: true
    columns: true
  transformation:
    staging:
      +database: maplestory
      +schema: staging
      +materialized: view
    intermediate:
      +materialized: view
    mart:
      +materialized: view
