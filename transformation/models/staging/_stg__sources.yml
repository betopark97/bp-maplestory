          - name: ocid
            data_type: varchar
          - name: character_name
            data_type: varchar
          - name: world_name
            data_type: varchar
          - name: character_level
            data_type: bigint
          - name: character_class
            data_type: varchar
          - name: daily_contents
            data_type: jsonb
          - name: weekly_contents
            data_type: jsonb
          - name: boss_contents
            data_type: jsonb
          - name: weekly_boss_clear_count
            data_type: bigint
          - name: weekly_boss_clear_limit_count
