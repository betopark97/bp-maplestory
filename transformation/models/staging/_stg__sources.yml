            data_type: jsonb
          - name: preset_hexa_stat_core
            data_type: jsonb
          - name: preset_hexa_stat_core_2
            data_type: jsonb
          - name: preset_hexa_stat_core_3
            data_type: jsonb
      - name: character_other_stat
        description: "Character's other stat-influencing factors (challengers world, event, etc.)."
        columns:
          - name: date
            data_type: date
          - name: ocid
            data_type: varchar
          - name: other_stat
            data_type: jsonb
      - name: character_ring_reserve_skill_equipment
